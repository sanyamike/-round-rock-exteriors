<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Round Rock Exteriors – Quote & Invoice Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rock-blue: #1B4D89;
      --rock-blue-dark: #143a6b;
      --pressure-orange: #E8611A;
      --slate-black: #1A1E2C;
      --clean-white: #F7F8FA;
      --stone-gray: #6B7280;
      --fresh-green: #22C55E;
      --border: #E2E8F0;
    }
    body { font-family: 'Inter', sans-serif; background: var(--clean-white); color: var(--slate-black); min-height: 100vh; }

    /* ---- SHELL ---- */
    .shell { display: grid; grid-template-columns: 380px 1fr; min-height: 100vh; }

    /* ---- SIDEBAR ---- */
    .sidebar {
      background: var(--slate-black);
      border-right: 3px solid var(--pressure-orange);
      padding: 32px 28px;
      overflow-y: auto;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
    .logo-mark {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--rock-blue); border: 2px solid var(--pressure-orange);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 15px; color: #fff;
    }
    .logo-text { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 14px; color: #fff; line-height: 1.3; }
    .logo-text span { color: var(--pressure-orange); font-weight: 500; font-size: 11px; display: block; letter-spacing: 1.5px; text-transform: uppercase; }

    .sidebar-section { margin-bottom: 28px; }
    .sidebar-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 14px; display: block;
    }

    /* doc type toggle */
    .doc-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .doc-btn {
      padding: 10px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.15);
      background: transparent; color: rgba(255,255,255,0.6);
      font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 13px;
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .doc-btn.active { background: var(--pressure-orange); border-color: var(--pressure-orange); color: #fff; }

    /* form fields */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 10px 13px;
      background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: #fff; font-family: 'Inter', sans-serif; font-size: 14px;
      outline: none; transition: border-color .2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--pressure-orange); }
    .field input::placeholder, .field textarea::placeholder { color: rgba(255,255,255,0.25); }
    .field select option { background: var(--slate-black); color: #fff; }
    .field textarea { height: 72px; resize: vertical; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* services checklist */
    .service-item {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 12px 14px;
      margin-bottom: 8px; cursor: pointer; transition: all .2s;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .service-item:hover { border-color: rgba(232,97,26,0.4); background: rgba(232,97,26,0.06); }
    .service-item.selected { border-color: var(--pressure-orange); background: rgba(232,97,26,0.1); }
    .service-checkbox {
      width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px; transition: all .2s;
    }
    .service-item.selected .service-checkbox { background: var(--pressure-orange); border-color: var(--pressure-orange); }
    .service-check-icon { font-size: 12px; color: #fff; display: none; }
    .service-item.selected .service-check-icon { display: block; }
    .service-info { flex: 1; }
    .service-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 2px; }
    .service-desc { font-size: 11px; color: rgba(255,255,255,0.4); line-height: 1.4; }
    .service-price-tag { font-size: 13px; font-weight: 700; color: var(--pressure-orange); margin-top: 4px; }

    /* price override */
    .price-override {
      display: none; margin-top: 8px;
    }
    .service-item.selected .price-override { display: block; }
    .price-override input {
      width: 100%; padding: 7px 10px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(232,97,26,0.3);
      border-radius: 6px; color: #fff; font-family: 'Inter', sans-serif; font-size: 13px;
      outline: none;
    }
    .price-override label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 4px; display: block; }

    /* discount & deposit */
    .discount-row { display: flex; align-items: center; gap: 10px; }
    .discount-row input { flex: 1; }
    .discount-type {
      background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: #fff; font-size: 13px; padding: 10px 8px;
      outline: none; cursor: pointer;
    }

    /* actions */
    .sidebar-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .btn-generate {
      width: 100%; padding: 14px; border-radius: 10px;
      background: var(--pressure-orange); border: none;
      color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 15px;
      cursor: pointer; transition: background .2s;
    }
    .btn-generate:hover { background: #c4511a; }
    .btn-print {
      width: 100%; padding: 12px; border-radius: 10px;
      background: transparent; border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: all .2s;
    }
    .btn-print:hover { border-color: #fff; color: #fff; }

    /* ---- PREVIEW PANE ---- */
    .preview-pane {
      padding: 48px 60px;
      overflow-y: auto;
    }
    .preview-pane h2 {
      font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; color: var(--stone-gray);
      margin-bottom: 32px;
    }

    /* ---- DOCUMENT ---- */
    .document {
      max-width: 700px; background: #fff;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    }

    /* doc header */
    .doc-header {
      background: linear-gradient(135deg, var(--rock-blue) 0%, var(--slate-black) 100%);
      padding: 28px 36px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .doc-brand { display: flex; align-items: center; gap: 12px; }
    .doc-logo-mark {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 2px solid var(--pressure-orange);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 15px; color: #fff;
    }
    .doc-brand-name { font-family: 'Montserrat', sans-serif; font-size: 17px; font-weight: 800; color: #fff; }
    .doc-brand-name span { color: var(--pressure-orange); font-weight: 300; }
    .doc-brand-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .doc-contact { text-align: right; font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.8; }
    .doc-contact .phone { color: var(--pressure-orange); font-weight: 700; font-size: 14px; }

    /* orange bar */
    .doc-orange-bar { height: 4px; background: var(--pressure-orange); }

    /* doc meta */
    .doc-meta {
      padding: 24px 36px;
      display: flex; justify-content: space-between; align-items: flex-start;
      border-bottom: 1px solid var(--border);
    }
    .doc-type-label {
      font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 900;
      color: var(--slate-black); letter-spacing: -0.5px;
    }
    .doc-type-label span { color: var(--pressure-orange); }
    .doc-number { font-size: 13px; color: var(--stone-gray); margin-top: 4px; }
    .doc-dates { text-align: right; font-size: 13px; color: var(--stone-gray); line-height: 2; }
    .doc-dates strong { color: var(--slate-black); }

    /* customer block */
    .doc-customer {
      padding: 20px 36px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 40px;
    }
    .doc-customer-block h4 { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--stone-gray); margin-bottom: 8px; }
    .doc-customer-block p { font-size: 14px; color: var(--slate-black); line-height: 1.7; }
    .doc-customer-block .name { font-weight: 700; font-size: 16px; }

    /* status badge */
    .status-badge {
      padding: 6px 16px; border-radius: 100px;
      font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      white-space: nowrap;
    }
    .status-quote    { background: rgba(27,77,137,0.1);  color: var(--rock-blue); }
    .status-invoice  { background: rgba(245,158,11,0.12); color: #B45309; }
    .status-paid     { background: rgba(34,197,94,0.12);  color: #15803D; }

    /* line items */
    .doc-items { padding: 0 36px; }
    .items-table { width: 100%; border-collapse: collapse; margin: 24px 0; }
    .items-table th {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--stone-gray); padding: 0 0 12px;
      border-bottom: 2px solid var(--border); text-align: left;
    }
    .items-table th:last-child { text-align: right; }
    .items-table td {
      padding: 14px 0; border-bottom: 1px solid var(--border);
      font-size: 14px; vertical-align: top;
    }
    .items-table td:last-child { text-align: right; font-weight: 600; white-space: nowrap; }
    .item-name { font-weight: 600; color: var(--slate-black); }
    .item-desc { font-size: 12px; color: var(--stone-gray); margin-top: 3px; line-height: 1.4; }
    .items-table tr:last-child td { border-bottom: none; }

    /* totals */
    .doc-totals {
      padding: 20px 36px 28px;
      display: flex; justify-content: flex-end;
      border-top: 2px solid var(--border);
    }
    .totals-box { width: 260px; }
    .total-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
    .total-row .label { color: var(--stone-gray); }
    .total-row .value { font-weight: 600; }
    .total-row.discount .value { color: var(--fresh-green); }
    .total-row.total-final {
      border-top: 2px solid var(--slate-black);
      margin-top: 8px; padding-top: 14px;
    }
    .total-row.total-final .label { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 15px; color: var(--slate-black); }
    .total-row.total-final .value { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 22px; color: var(--pressure-orange); }
    .deposit-note {
      margin-top: 12px; padding: 12px 14px;
      background: rgba(27,77,137,0.06); border-radius: 8px; border-left: 3px solid var(--rock-blue);
      font-size: 12px; color: var(--stone-gray); line-height: 1.5;
    }

    /* notes */
    .doc-notes {
      padding: 0 36px 28px;
    }
    .doc-notes h4 { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--stone-gray); margin-bottom: 10px; }
    .doc-notes p { font-size: 13px; color: var(--slate-black); line-height: 1.6; white-space: pre-wrap; }

    /* footer strip */
    .doc-footer-strip {
      background: var(--slate-black);
      padding: 20px 36px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .doc-footer-strip p { font-size: 12px; color: rgba(255,255,255,0.4); }
    .doc-footer-strip .tagline { color: var(--pressure-orange); font-weight: 700; font-size: 13px; }

    /* empty state */
    .empty-state {
      text-align: center; padding: 80px 40px;
      color: var(--stone-gray);
    }
    .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 20px; color: var(--slate-black); margin-bottom: 8px; }
    .empty-state p { font-size: 15px; }

    /* ---- PRINT ---- */
    @media print {
      .sidebar { display: none; }
      .shell { grid-template-columns: 1fr; }
      .preview-pane { padding: 0; }
      .preview-pane h2 { display: none; }
      .document { box-shadow: none; border-radius: 0; max-width: 100%; }
      body { background: #fff; }
    }

    /* responsive */
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .preview-pane { padding: 32px 20px; }
      .doc-header { flex-direction: column; gap: 16px; }
      .doc-contact { text-align: left; }
      .doc-meta { flex-direction: column; gap: 12px; }
      .doc-dates { text-align: left; }
      .doc-customer { flex-direction: column; gap: 20px; }
      .doc-totals { justify-content: flex-start; }
      .totals-box { width: 100%; }
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">RR</div>
      <div class="logo-text">
        Round Rock Exteriors
        <span>Quote & Invoice Builder</span>
      </div>
    </div>

    <!-- Document type -->
    <div class="sidebar-section">
      <span class="sidebar-label">Document Type</span>
      <div class="doc-toggle">
        <button class="doc-btn active" onclick="setDocType('QUOTE')">📋 Quote</button>
        <button class="doc-btn" onclick="setDocType('INVOICE')">🧾 Invoice</button>
      </div>
    </div>

    <!-- Customer info -->
    <div class="sidebar-section">
      <span class="sidebar-label">Customer</span>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="cust-name" placeholder="John Smith" oninput="render()" />
      </div>
      <div class="field">
        <label>Address</label>
        <input type="text" id="cust-addr" placeholder="123 Oak St, Round Rock, TX" oninput="render()" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Phone</label>
          <input type="text" id="cust-phone" placeholder="(512) 555-0000" oninput="render()" />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="text" id="cust-email" placeholder="email@..." oninput="render()" />
        </div>
      </div>
    </div>

    <!-- Dates -->
    <div class="sidebar-section">
      <span class="sidebar-label">Dates</span>
      <div class="field-row">
        <div class="field">
          <label>Issue Date</label>
          <input type="date" id="date-issue" oninput="render()" />
        </div>
        <div class="field">
          <label id="date2-label">Valid Until</label>
          <input type="date" id="date-due" oninput="render()" />
        </div>
      </div>
    </div>

    <!-- Services -->
    <div class="sidebar-section">
      <span class="sidebar-label">Services</span>
      <div id="services-list"></div>
    </div>

    <!-- Discount -->
    <div class="sidebar-section">
      <span class="sidebar-label">Discount</span>
      <div class="field">
        <div class="discount-row">
          <input class="field" type="number" id="discount-val" placeholder="0" min="0" oninput="render()" style="padding:10px 13px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:14px;outline:none;" />
          <select class="discount-type" id="discount-type" onchange="render()">
            <option value="pct">%</option>
            <option value="flat">$</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Payment -->
    <div class="sidebar-section" id="payment-section">
      <span class="sidebar-label">Payment</span>
      <div class="field">
        <label>Status</label>
        <select id="pay-status" onchange="render()">
          <option value="quote">Pending Quote</option>
          <option value="deposit">50% Deposit Due</option>
          <option value="balance">Balance Due</option>
          <option value="paid">Paid in Full</option>
        </select>
      </div>
    </div>

    <!-- Notes -->
    <div class="sidebar-section">
      <span class="sidebar-label">Notes / Terms</span>
      <div class="field">
        <textarea id="doc-notes" placeholder="e.g. Please ensure water spigot is accessible. Payment via Zelle, Venmo, or card." oninput="render()"></textarea>
      </div>
    </div>

    <!-- Doc number -->
    <div class="sidebar-section">
      <span class="sidebar-label">Document Number</span>
      <div class="field">
        <input type="text" id="doc-num" placeholder="RRE-2024-001" oninput="render()" />
      </div>
    </div>

    <div class="sidebar-actions">
      <button class="btn-generate" onclick="render()">↻ Refresh Preview</button>
      <button class="btn-print" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
  </div>

  <!-- ===== PREVIEW PANE ===== -->
  <div class="preview-pane">
    <h2>Document Preview</h2>
    <div id="document-output"></div>
  </div>

</div>

<script>
  const SERVICES = [
    { id: 'driveway',  name: 'Driveway & Concrete Cleaning', desc: 'High-pressure removal of oil stains, mold, algae, and buildup.',   price: 150 },
    { id: 'house',     name: 'House Soft Washing',           desc: 'Safe soft-wash for siding, brick, and stucco.',                  price: 220 },
    { id: 'deck',      name: 'Deck & Patio Cleaning',        desc: 'Low-pressure wood/composite cleaning. Color restoration.',       price: 180 },
    { id: 'roof',      name: 'Roof Soft Washing',            desc: 'Biodegradable treatment for algae streaks and moss.',            price: 320 },
    { id: 'fence',     name: 'Fence Washing',                desc: 'Wood, vinyl, or metal fence cleaning.',                         price: 120 },
    { id: 'gutter',    name: 'Gutter Cleaning',              desc: 'Debris removal and downspout flush.',                           price: 110 },
    { id: 'windows',   name: 'Window Cleaning',              desc: 'Interior/exterior streak-free window washing.',                  price: 130 },
    { id: 'concrete2', name: 'Concrete Sealing',             desc: 'Protective sealant after cleaning. Lasts 2–3 years.',           price: 225 },
  ];

  let docType = 'QUOTE';
  let selectedServices = {}; // id -> custom price (null = default)

  // Init
  function init() {
    // Build services list
    const list = document.getElementById('services-list');
    list.innerHTML = '';
    SERVICES.forEach(s => {
      const el = document.createElement('div');
      el.className = 'service-item';
      el.id = 'si-' + s.id;
      el.innerHTML = `
        <div class="service-checkbox"><span class="service-check-icon">✓</span></div>
        <div class="service-info">
          <div class="service-name">${s.name}</div>
          <div class="service-desc">${s.desc}</div>
          <div class="service-price-tag" id="spt-${s.id}">$${s.price}</div>
          <div class="price-override">
            <label>Custom price</label>
            <input type="number" id="cp-${s.id}" placeholder="${s.price}" min="0"
              onclick="event.stopPropagation()"
              oninput="event.stopPropagation(); updateCustomPrice('${s.id}', this.value); render()" />
          </div>
        </div>`;
      el.onclick = () => toggleService(s.id);
      list.appendChild(el);
    });

    // Set default dates
    const today = new Date();
    const todayStr = today.toISOString().slice(0, 10);
    const futureDate = new Date(today);
    futureDate.setDate(futureDate.getDate() + 30);
    document.getElementById('date-issue').value = todayStr;
    document.getElementById('date-due').value = futureDate.toISOString().slice(0, 10);

    // Default notes
    document.getElementById('doc-notes').value = 'Please ensure water spigot is accessible on day of service.\nPayment accepted via Zelle, Venmo, cash, or card.\n100% satisfaction guaranteed — we\'ll re-clean any area you\'re not happy with.';

    // Default doc number
    document.getElementById('doc-num').value = 'RRE-' + new Date().getFullYear() + '-001';

    render();
  }

  function toggleService(id) {
    const el = document.getElementById('si-' + id);
    if (selectedServices[id] !== undefined) {
      delete selectedServices[id];
      el.classList.remove('selected');
    } else {
      selectedServices[id] = null;
      el.classList.add('selected');
    }
    render();
  }

  function updateCustomPrice(id, val) {
    if (selectedServices[id] !== undefined) {
      selectedServices[id] = val === '' ? null : parseFloat(val) || null;
    }
  }

  function setDocType(type) {
    docType = type;
    document.querySelectorAll('.doc-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    // Update date label
    document.getElementById('date2-label').textContent = type === 'QUOTE' ? 'Valid Until' : 'Due Date';
    render();
  }

  function fmtDate(val) {
    if (!val) return '—';
    const [y, m, d] = val.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
  }

  function fmt$(n) { return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

  function render() {
    const custName  = document.getElementById('cust-name').value.trim();
    const custAddr  = document.getElementById('cust-addr').value.trim();
    const custPhone = document.getElementById('cust-phone').value.trim();
    const custEmail = document.getElementById('cust-email').value.trim();
    const dateIssue = document.getElementById('date-issue').value;
    const dateDue   = document.getElementById('date-due').value;
    const discountVal  = parseFloat(document.getElementById('discount-val').value) || 0;
    const discountType = document.getElementById('discount-type').value;
    const payStatus = document.getElementById('pay-status').value;
    const notes     = document.getElementById('doc-notes').value.trim();
    const docNum    = document.getElementById('doc-num').value.trim() || 'RRE-001';

    // Build line items
    const lineItems = Object.keys(selectedServices).map(id => {
      const svc = SERVICES.find(s => s.id === id);
      const customPrice = selectedServices[id];
      const price = (customPrice !== null && customPrice !== undefined) ? customPrice : svc.price;
      return { ...svc, finalPrice: price };
    });

    if (lineItems.length === 0) {
      document.getElementById('document-output').innerHTML = `
        <div class="empty-state">
          <div class="icon">📋</div>
          <h3>Select services to preview</h3>
          <p>Check off services on the left to build your quote or invoice.</p>
        </div>`;
      return;
    }

    const subtotal = lineItems.reduce((sum, i) => sum + i.finalPrice, 0);
    let discountAmt = 0;
    if (discountVal > 0) {
      discountAmt = discountType === 'pct' ? subtotal * (discountVal / 100) : discountVal;
      discountAmt = Math.min(discountAmt, subtotal);
    }
    const total = subtotal - discountAmt;
    const depositAmt = total * 0.5;

    // Status badge
    const statusMap = {
      quote:   { label: 'Quote',          cls: 'status-quote'   },
      deposit: { label: 'Deposit Due',    cls: 'status-invoice' },
      balance: { label: 'Balance Due',    cls: 'status-invoice' },
      paid:    { label: '✓ Paid in Full', cls: 'status-paid'    },
    };
    const status = statusMap[payStatus] || statusMap.quote;

    // Payment note
    let payNote = '';
    if (payStatus === 'deposit') {
      payNote = `<div class="deposit-note">A 50% deposit of <strong>${fmt$(depositAmt)}</strong> is due to confirm your appointment. The remaining balance of <strong>${fmt$(depositAmt)}</strong> is due on the day of service.</div>`;
    } else if (payStatus === 'balance') {
      payNote = `<div class="deposit-note">Deposit received. Remaining balance of <strong>${fmt$(total)}</strong> is due on completion of service. Payment via Zelle, Venmo, or card.</div>`;
    } else if (payStatus === 'paid') {
      payNote = `<div class="deposit-note" style="border-left-color:var(--fresh-green);background:rgba(34,197,94,0.06);">✅ Payment received in full. Thank you for choosing Round Rock Exteriors!</div>`;
    }

    // Discount row HTML
    const discountRow = discountAmt > 0 ? `
      <div class="total-row discount">
        <span class="label">Discount${discountType === 'pct' ? ` (${discountVal}%)` : ''}</span>
        <span class="value">−${fmt$(discountAmt)}</span>
      </div>` : '';

    // Line items HTML
    const lineItemsHtml = lineItems.map(item => `
      <tr>
        <td>
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
        </td>
        <td>1</td>
        <td>${fmt$(item.finalPrice)}</td>
        <td>${fmt$(item.finalPrice)}</td>
      </tr>`).join('');

    document.getElementById('document-output').innerHTML = `
      <div class="document">
        <div class="doc-header">
          <div class="doc-brand">
            <div class="doc-logo-mark">RR</div>
            <div>
              <div class="doc-brand-name">ROUND ROCK <span>EXTERIORS</span></div>
              <div class="doc-brand-sub">Professional Pressure Washing</div>
            </div>
          </div>
          <div class="doc-contact">
            <div class="phone">(512) 555-0000</div>
            <div>hello@roundrockexteriors.com</div>
            <div>roundrockexteriors.com</div>
            <div>Round Rock, TX</div>
          </div>
        </div>
        <div class="doc-orange-bar"></div>

        <div class="doc-meta">
          <div>
            <div class="doc-type-label">${docType} <span>#${docNum}</span></div>
            <div class="doc-number">Round Rock Exteriors, LLC</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
            <span class="status-badge ${status.cls}">${status.label}</span>
            <div class="doc-dates">
              <div>Issue Date: <strong>${fmtDate(dateIssue)}</strong></div>
              <div>${docType === 'QUOTE' ? 'Valid Until' : 'Due Date'}: <strong>${fmtDate(dateDue)}</strong></div>
            </div>
          </div>
        </div>

        <div class="doc-customer">
          <div class="doc-customer-block">
            <h4>Bill To</h4>
            <p class="name">${custName || 'Customer Name'}</p>
            <p>${custAddr || 'Service Address'}</p>
            ${custPhone ? `<p>${custPhone}</p>` : ''}
            ${custEmail ? `<p>${custEmail}</p>` : ''}
          </div>
          <div class="doc-customer-block" style="text-align:right;">
            <h4>Service Details</h4>
            <p>${lineItems.length} service${lineItems.length > 1 ? 's' : ''} scheduled</p>
            <p>Williamson County, TX</p>
          </div>
        </div>

        <div class="doc-items">
          <table class="items-table">
            <thead>
              <tr>
                <th style="width:55%">Service</th>
                <th>Qty</th>
                <th>Unit Price</th>
                <th style="text-align:right">Total</th>
              </tr>
            </thead>
            <tbody>${lineItemsHtml}</tbody>
          </table>
        </div>

        <div class="doc-totals">
          <div class="totals-box">
            <div class="total-row">
              <span class="label">Subtotal</span>
              <span class="value">${fmt$(subtotal)}</span>
            </div>
            ${discountRow}
            <div class="total-row total-final">
              <span class="label">TOTAL</span>
              <span class="value">${fmt$(total)}</span>
            </div>
            ${payNote}
          </div>
        </div>

        ${notes ? `<div class="doc-notes">
          <h4>Notes & Terms</h4>
          <p>${notes.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>
        </div>` : ''}

        <div class="doc-footer-strip">
          <p>Thank you for your business, ${custName || 'valued customer'}.</p>
          <span class="tagline">Your home's exterior, restored.</span>
        </div>
      </div>`;
  }

  init();
</script>
</body>
</html>
